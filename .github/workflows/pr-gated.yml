name: Gated pull request
on:
    workflow_dispatch:
    pull_request:
        branches: [master]
jobs:
    build-and-test:
        runs-on: windows-latest
        steps:
            - name: checkout
              uses: actions/checkout@v4.1.2
            - name: setup node
              uses: actions/setup-node@v4.0.2
              with:
                  node-version: "18.17"
            - run: node -v
            - run: npm ci
            - name: npm audit
              shell: pwsh
              run: |
                  $auditOutput = npm audit --json | Out-String
                  $auditExitCode = $LASTEXITCODE

                  if ($auditExitCode -eq 0) {
                      Write-Host "npm audit found no vulnerabilities."
                  } else {
                      try {
                          $audit = $auditOutput | ConvertFrom-Json
                          $vulnerabilities = $audit.metadata.vulnerabilities
                          $summary = @(
                              "total=$($vulnerabilities.total)"
                              "critical=$($vulnerabilities.critical)"
                              "high=$($vulnerabilities.high)"
                              "moderate=$($vulnerabilities.moderate)"
                              "low=$($vulnerabilities.low)"
                          ) -join ", "

                          Write-Host "::warning title=npm audit::$summary"
                      } catch {
                          Write-Host "::warning title=npm audit::npm audit reported vulnerabilities, but the JSON summary could not be parsed: $($_.Exception.Message)"
                      }

                      Write-Host $auditOutput
                  }
            - run: npm run build
            - run: npm run test
